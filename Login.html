<!-- Overlay de Sucesso (Bola Atravessando) -->
<div id="login-success-feedback" class="login-success-overlay">
    <div class="traversing-ball"></div>
    <div class="success-content">
        <div class="welcome-message-internal" id="welcome-text">
            Bem-vindo <span id="user-name-welcome"></span>
        </div>
    </div>
</div>

<script>
    function iniciarLogin() {
        const btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.innerHTML = 'Verificando...';

        google.script.run
            .withSuccessHandler(profile => {
                if (profile.isValid) mostrarSucesso(profile.name);
                else {
                    document.getElementById('login-error').style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" style="width: 24px; height: 24px; margin-right: 10px; vertical-align: middle;"> Entrar com Google';
                }
            })
            .withFailureHandler(err => {
                console.error('Erro login:', err);
                btn.disabled = false;
                btn.innerHTML = '<img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" style="width: 24px; height: 24px; margin-right: 10px; vertical-align: middle;"> Entrar com Google';
            })
            .getCompleteUserProfile();
    }

    function mostrarSucesso(nome) {
        const overlay = document.getElementById('login-success-feedback');
        const welcomeText = document.getElementById('user-name-welcome');

        const nomeFormatado = nome.split(' ').map(word =>
            word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
        ).join(' ') + "!";

        welcomeText.textContent = nomeFormatado;
        overlay.classList.add('active');

        setTimeout(() => {
            const loginScreen = document.getElementById('login-screen');
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    overlay.classList.remove('active');
                    if (window.finalizarSessaoLogin) finalizarSessaoLogin();
                }, 300);
            }, 500);
        }, 2000);
    }
</script>
